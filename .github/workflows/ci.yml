name: MLflow CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 dagshub joblib matplotlib

      - name: Run modelling
        working-directory: ./MLProject
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/IslahulHadi/Retail-OpsML-Ahul.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python modelling_ci.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            MLProject/kmeans_rfm_model.pkl
            MLProject/rfm_scaler.pkl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug secret format (safe - no value leaked)
        run: |
          echo "Username length: ${#DOCKERHUB_USERNAME}"
          echo "Token length: ${#DOCKERHUB_TOKEN}"
          echo "Username first char (ascii): $(echo -n "$DOCKERHUB_USERNAME" | head -c1 | od -An -tu1)"
          echo "Token first 8 chars: ${DOCKERHUB_TOKEN:0:8}"
          echo "Token last char (ascii, should not be 10=newline or 32=space): $(echo -n "$DOCKERHUB_TOKEN" | tail -c1 | od -An -tu1)"
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Docker Hub (CLI direct)
        run: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./MLProject
          file: ./MLProject/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/customer-segmentation:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/customer-segmentation:${{ github.sha }}
